<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Countdown</title>
    </head>
    <body>
        <div class="content">
            <p>__title__</p>
            <h1><span>__percentage__%</span></h1>
            <p>
                <span>__days_left__</span> days left until the target date<br />Target
                date: <span>__target_date__</span>
            </p>
        </div>
        <a href="/create" class="sticky-button">Create your own countdown</a>
    </body>
</html>
