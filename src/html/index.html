<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Countdown</title>
    </head>
    <body>
        <div class="content">
            <h1><span>__percentage__%</span></h1>
            <p>
                Of the year has passed, that's <span>__days_passed__</span> out
                of <span>__days_in_year__</span> days.
            </p>
        </div>
        <a href="/create" class="sticky-button">Create your own countdown</a>
    </body>
</html>
